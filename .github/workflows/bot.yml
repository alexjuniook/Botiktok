name: Bot TikTok Automático

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch: 

jobs:
  postar_video:
    runs-on: ubuntu-latest

    steps:
    - name: Baixar o código do repositório
      uses: actions/checkout@v4

    - name: Configurar o Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Instalar ImageMagick (Edição de Vídeo)
      run: |
        sudo apt-get update
        sudo apt-get install -y imagemagick
        sudo sed -i 's/<policy domain="path" rights="none" pattern="@\*"//g' /etc/ImageMagick-6/policy.xml

    - name: Instalar bibliotecas do Python
      run: pip install -r requirements.txt

    - name: Executar o Bot Principal
      env:
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
        TIKTOK_COOKIES: ${{ secrets.TIKTOK_COOKIES }}
      run: python bot.py

    - name: Capturar Câmera de Segurança (Fotos da Tela)
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: auditoria-tiktok
        path: "*.png"
